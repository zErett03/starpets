version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: starpets
      POSTGRES_PASSWORD: starpets
      POSTGRES_DB: starpets
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    command: python main.py
    env_file: .env
    depends_on:
      - db
    ports:
      - "8000:8000"

volumes:
  pgdata:
